<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="ProxyGuard ML social card">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030A10"/>
      <stop offset="50%" stop-color="#071820"/>
      <stop offset="100%" stop-color="#04201C"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="orb" cx="80%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(34,211,238,0.06)" stroke-width="1"/>
    </pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5"/></filter>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <rect width="1280" height="640" fill="url(#orb)"/>
  <rect x="0" y="0" width="12" height="640" fill="url(#accent)"/>

  <!-- mini logo -->
  <g transform="translate(80,120)">
    <rect width="88" height="88" rx="22" fill="#0A1E28" stroke="#22D3EE" stroke-opacity="0.4"/>
    <path d="M44 16 L72 30 V52 C72 72 58 88 44 96 C30 88 16 72 16 52 V30 Z" fill="none" stroke="#22D3EE" stroke-width="3.5"/>
    <path d="M32 58 L42 68 L58 46" fill="none" stroke="#ECFEFF" stroke-width="4" stroke-linecap="round"/>
  </g>

  <text x="200" y="170" fill="#5EEAD4" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="4">OPEN SOURCE · RESEARCH DEMO</text>
  <text x="200" y="250" fill="#F0FDFA" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="72" font-weight="800">ProxyGuard ML</text>
  <text x="200" y="320" fill="#94B8C4" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="30">Encrypted proxy traffic recognition</text>
  <text x="200" y="365" fill="#94B8C4" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="30">without decrypting a single byte</text>

  <g font-family="Segoe UI, Helvetica, Arial, sans-serif">
    <rect x="200" y="430" rx="20" width="150" height="44" fill="rgba(20,184,166,0.12)" stroke="rgba(45,212,191,0.4)"/>
    <text x="230" y="459" fill="#CCFBF1" font-size="18">FastAPI</text>
    <rect x="370" y="430" rx="20" width="170" height="44" fill="rgba(20,184,166,0.12)" stroke="rgba(45,212,191,0.4)"/>
    <text x="395" y="459" fill="#CCFBF1" font-size="18">Ensemble ML</text>
    <rect x="560" y="430" rx="20" width="160" height="44" fill="rgba(20,184,166,0.12)" stroke="rgba(45,212,191,0.4)"/>
    <text x="590" y="459" fill="#CCFBF1" font-size="18">17-D Flow</text>
    <rect x="740" y="430" rx="20" width="180" height="44" fill="rgba(20,184,166,0.12)" stroke="rgba(45,212,191,0.4)"/>
    <text x="765" y="459" fill="#CCFBF1" font-size="18">Web Console</text>
  </g>

  <text x="200" y="560" fill="#5B8794" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20">github.com/ibi6/ProxyGuard-ML</text>
</svg>
