<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="360" viewBox="0 0 1100 360" role="img" aria-label="Inference pipeline">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050D14"/>
      <stop offset="100%" stop-color="#0B1F2A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <style>
      .t { font-family: ui-sans-serif, Segoe UI, Helvetica, Arial, sans-serif; }
      .h { fill: #E6F7F8; font-weight: 700; }
      .s { fill: #7FA8B5; }
      .n { fill: #5EEAD4; font-weight: 700; }
      .card { fill: #0C1F2A; stroke: rgba(45,212,191,0.3); }
    </style>
  </defs>
  <rect width="1100" height="360" rx="20" fill="url(#bg)"/>
  <text class="t h" x="40" y="42" font-size="22">Recognition Pipeline · Zero Payload Decrypt</text>
  <text class="t s" x="40" y="68" font-size="14">Side-channel statistics only — TLS / proxy ciphertext stays opaque</text>

  <!-- steps -->
  <g>
    <rect class="card" x="40" y="110" width="180" height="170" rx="16"/>
    <text class="t n" x="58" y="145" font-size="13">01</text>
    <text class="t h" x="58" y="180" font-size="18">Flow</text>
    <text class="t h" x="58" y="204" font-size="18">Observe</text>
    <text class="t s" x="58" y="240" font-size="13">pkt sizes · IAT</text>
    <text class="t s" x="58" y="260" font-size="13">direction · volume</text>
  </g>
  <path d="M232 195 L258 195" stroke="url(#accent)" stroke-width="3"/>
  <path d="M250 188 L262 195 L250 202" fill="#22D3EE"/>

  <g>
    <rect class="card" x="270" y="110" width="180" height="170" rx="16"/>
    <text class="t n" x="288" y="145" font-size="13">02</text>
    <text class="t h" x="288" y="180" font-size="18">Feature</text>
    <text class="t h" x="288" y="204" font-size="18">Vector 17-D</text>
    <text class="t s" x="288" y="240" font-size="13">schema-validated</text>
    <text class="t s" x="288" y="260" font-size="13">label normalized</text>
  </g>
  <path d="M462 195 L488 195" stroke="url(#accent)" stroke-width="3"/>
  <path d="M480 188 L492 195 L480 202" fill="#22D3EE"/>

  <g>
    <rect class="card" x="500" y="110" width="180" height="170" rx="16"/>
    <text class="t n" x="518" y="145" font-size="13">03</text>
    <text class="t h" x="518" y="180" font-size="18">Ensemble</text>
    <text class="t h" x="518" y="204" font-size="18">Infer</text>
    <text class="t s" x="518" y="240" font-size="13">8 model zoo</text>
    <text class="t s" x="518" y="260" font-size="13">Voting / Stacking</text>
  </g>
  <path d="M692 195 L718 195" stroke="url(#accent)" stroke-width="3"/>
  <path d="M710 188 L722 195 L710 202" fill="#22D3EE"/>

  <g>
    <rect class="card" x="730" y="110" width="180" height="170" rx="16"/>
    <text class="t n" x="748" y="145" font-size="13">04</text>
    <text class="t h" x="748" y="180" font-size="18">Decide</text>
    <text class="t h" x="748" y="204" font-size="18">&amp; Score</text>
    <text class="t s" x="748" y="240" font-size="13">class + proba</text>
    <text class="t s" x="748" y="260" font-size="13">audit log</text>
  </g>
  <path d="M922 195 L948 195" stroke="url(#accent)" stroke-width="3"/>
  <path d="M940 188 L952 195 L940 202" fill="#22D3EE"/>

  <g>
    <rect class="card" x="960" y="110" width="100" height="170" rx="16" stroke="#5EEAD4"/>
    <text class="t n" x="978" y="160" font-size="12">OUT</text>
    <text class="t h" x="978" y="200" font-size="15">label</text>
    <text class="t h" x="978" y="224" font-size="15">conf.</text>
    <text class="t s" x="978" y="256" font-size="12">JSON</text>
  </g>

  <text class="t s" x="40" y="330" font-size="13">Guarantees: no DPI plaintext recovery · no TLS key material · no PCAP sniffer in default path</text>
</svg>
