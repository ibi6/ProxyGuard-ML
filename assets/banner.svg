<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="ProxyGuard ML">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#061018"/>
      <stop offset="45%" stop-color="#0B1F33"/>
      <stop offset="100%" stop-color="#08252E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1BB6C1"/>
      <stop offset="100%" stop-color="#3DDC97"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="1" y2="1">
      <stop offset="0%" stop-color="#1BB6C1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1BB6C1" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(27,182,193,0.08)" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <circle cx="1040" cy="140" r="220" fill="url(#glow)"/>
  <circle cx="180" cy="520" r="180" fill="url(#glow)"/>

  <!-- left accent bar -->
  <rect x="0" y="0" width="10" height="640" fill="url(#accent)"/>

  <!-- shield mark -->
  <g transform="translate(96,170)" filter="url(#soft)">
    <path d="M70 8 L132 36 V96 C132 148 104 188 70 208 C36 188 8 148 8 96 V36 Z"
          fill="none" stroke="#1BB6C1" stroke-width="4" opacity="0.95"/>
    <path d="M70 40 L108 58 V98 C108 132 90 158 70 172 C50 158 32 132 32 98 V58 Z"
          fill="rgba(27,182,193,0.12)" stroke="#3DDC97" stroke-width="2.5"/>
    <path d="M52 108 L66 122 L92 88" fill="none" stroke="#E8F7F8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- title block -->
  <text x="280" y="250" fill="#E8F7F8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="64" font-weight="700">ProxyGuard ML</text>
  <text x="280" y="310" fill="#8FB3C4" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="28">Encrypted Proxy Traffic Recognition with Ensemble Learning</text>

  <!-- pills -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#D8F4F6">
    <rect x="280" y="360" rx="18" ry="18" width="150" height="40" fill="rgba(27,182,193,0.15)" stroke="rgba(27,182,193,0.45)"/>
    <text x="308" y="386">FastAPI</text>

    <rect x="448" y="360" rx="18" ry="18" width="170" height="40" fill="rgba(27,182,193,0.15)" stroke="rgba(27,182,193,0.45)"/>
    <text x="470" y="386">scikit-learn</text>

    <rect x="636" y="360" rx="18" ry="18" width="150" height="40" fill="rgba(27,182,193,0.15)" stroke="rgba(27,182,193,0.45)"/>
    <text x="662" y="386">XGBoost</text>

    <rect x="804" y="360" rx="18" ry="18" width="160" height="40" fill="rgba(27,182,193,0.15)" stroke="rgba(27,182,193,0.45)"/>
    <text x="828" y="386">LightGBM</text>
  </g>

  <!-- bottom metrics strip -->
  <rect x="280" y="450" width="840" height="90" rx="16" fill="rgba(8,24,36,0.72)" stroke="rgba(27,182,193,0.25)"/>
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" text-anchor="middle">
    <text x="400" y="490" fill="#1BB6C1" font-size="28" font-weight="700">4</text>
    <text x="400" y="520" fill="#8FB3C4" font-size="16">Traffic Classes</text>

    <text x="600" y="490" fill="#1BB6C1" font-size="28" font-weight="700">17</text>
    <text x="600" y="520" fill="#8FB3C4" font-size="16">Flow Features</text>

    <text x="820" y="490" fill="#1BB6C1" font-size="28" font-weight="700">8</text>
    <text x="820" y="520" fill="#8FB3C4" font-size="16">ML Models</text>

    <text x="1020" y="490" fill="#3DDC97" font-size="28" font-weight="700">0</text>
    <text x="1020" y="520" fill="#8FB3C4" font-size="16">Payload Decrypt</text>
  </g>
</svg>
