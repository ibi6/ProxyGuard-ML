<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-label="System architecture">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050D14"/>
      <stop offset="100%" stop-color="#0A1A24"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F2430"/>
      <stop offset="100%" stop-color="#0B1B25"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <style>
      .t { font-family: ui-sans-serif, Segoe UI, Helvetica, Arial, sans-serif; }
      .h { fill: #E6F7F8; font-weight: 700; }
      .s { fill: #7FA8B5; }
      .a { fill: #5EEAD4; font-weight: 700; }
      .box { fill: url(#card); stroke: rgba(45,212,191,0.28); stroke-width: 1.2; }
    </style>
  </defs>
  <rect width="1100" height="620" rx="20" fill="url(#bg)"/>
  <text class="t h" x="40" y="48" font-size="22">ProxyGuard ML · Layered Architecture</text>
  <text class="t s" x="40" y="74" font-size="14">Presentation → API → Services → ML Core → Persistence</text>

  <!-- layer 1 -->
  <g filter="url(#shadow)">
    <rect class="box" x="40" y="110" width="1020" height="78" rx="14"/>
  </g>
  <text class="t a" x="60" y="140" font-size="13">L1  PRESENTATION</text>
  <text class="t h" x="60" y="168" font-size="18">Jinja2 Console · Dashboard / Data / Train / Predict / Experiments / Settings</text>
  <text class="t s" x="780" y="168" font-size="14">Chart.js · Tailwind CDN · app.css</text>

  <!-- arrow -->
  <path d="M550 188 L550 214" stroke="url(#line)" stroke-width="2.5"/>
  <path d="M543 208 L550 220 L557 208" fill="#22D3EE"/>

  <!-- layer 2 -->
  <g filter="url(#shadow)">
    <rect class="box" x="40" y="224" width="1020" height="78" rx="14"/>
  </g>
  <text class="t a" x="60" y="254" font-size="13">L2  API GATEWAY</text>
  <text class="t h" x="60" y="282" font-size="18">FastAPI  ·  /api/data  ·  /api/train  ·  /api/predict  ·  /api/experiments  ·  /api/settings</text>
  <text class="t s" x="860" y="282" font-size="14">OpenAPI /docs</text>

  <path d="M550 302 L550 328" stroke="url(#line)" stroke-width="2.5"/>
  <path d="M543 322 L550 334 L557 322" fill="#22D3EE"/>

  <!-- layer 3 services -->
  <g filter="url(#shadow)">
    <rect class="box" x="40" y="338" width="190" height="100" rx="14"/>
    <rect class="box" x="250" y="338" width="190" height="100" rx="14"/>
    <rect class="box" x="460" y="338" width="190" height="100" rx="14"/>
    <rect class="box" x="670" y="338" width="190" height="100" rx="14"/>
    <rect class="box" x="880" y="338" width="180" height="100" rx="14"/>
  </g>
  <text class="t a" x="56" y="368" font-size="12">DatasetService</text>
  <text class="t s" x="56" y="396" font-size="13">generate · upload</text>
  <text class="t s" x="56" y="416" font-size="13">active pointer</text>

  <text class="t a" x="266" y="368" font-size="12">TrainService</text>
  <text class="t s" x="266" y="396" font-size="13">async jobs</text>
  <text class="t s" x="266" y="416" font-size="13">SQLite status</text>

  <text class="t a" x="476" y="368" font-size="12">PredictService</text>
  <text class="t s" x="476" y="396" font-size="13">joblib load</text>
  <text class="t s" x="476" y="416" font-size="13">proba + label</text>

  <text class="t a" x="686" y="368" font-size="12">ExperimentService</text>
  <text class="t s" x="686" y="396" font-size="13">metrics pack</text>
  <text class="t s" x="686" y="416" font-size="13">zip export</text>

  <text class="t a" x="896" y="368" font-size="12">SettingsService</text>
  <text class="t s" x="896" y="396" font-size="13">seed · ratios</text>
  <text class="t s" x="896" y="416" font-size="13">persist KV</text>

  <path d="M550 438 L550 464" stroke="url(#line)" stroke-width="2.5"/>
  <path d="M543 458 L550 470 L557 458" fill="#22D3EE"/>

  <!-- layer 4 ml -->
  <g filter="url(#shadow)">
    <rect class="box" x="40" y="474" width="1020" height="56" rx="14"/>
  </g>
  <text class="t a" x="60" y="508" font-size="13">L4  ML CORE</text>
  <text class="t h" x="180" y="508" font-size="15">generator · features · labels · models · train · evaluate · predict</text>

  <path d="M550 530 L550 548" stroke="url(#line)" stroke-width="2.5"/>
  <path d="M543 542 L550 554 L557 542" fill="#22D3EE"/>

  <!-- layer 5 storage -->
  <g filter="url(#shadow)">
    <rect class="box" x="40" y="558" width="320" height="42" rx="12"/>
    <rect class="box" x="390" y="558" width="320" height="42" rx="12"/>
    <rect class="box" x="740" y="558" width="320" height="42" rx="12"/>
  </g>
  <text class="t h" x="70" y="585" font-size="14">data/  CSV · meta · active.json</text>
  <text class="t h" x="430" y="585" font-size="14">models/  *.joblib artifacts</text>
  <text class="t h" x="770" y="585" font-size="14">reports/ + SQLite task store</text>
</svg>
