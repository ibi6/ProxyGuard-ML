<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="Console mockup">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F1F5F9"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="side" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B1F2A"/>
      <stop offset="100%" stop-color="#0F2937"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <style>
      .t { font-family: Inter, Segoe UI, Helvetica, Arial, sans-serif; }
    </style>
  </defs>
  <!-- browser chrome -->
  <rect width="1200" height="720" rx="18" fill="#0F172A"/>
  <rect x="10" y="10" width="1180" height="700" rx="14" fill="url(#bg)"/>
  <rect x="10" y="10" width="1180" height="42" rx="14" fill="#0F172A"/>
  <circle cx="36" cy="31" r="6" fill="#F87171"/>
  <circle cx="56" cy="31" r="6" fill="#FBBF24"/>
  <circle cx="76" cy="31" r="6" fill="#34D399"/>
  <rect x="360" y="22" width="480" height="18" rx="9" fill="#1E293B"/>
  <text class="t" x="480" y="35" fill="#64748B" font-size="11">127.0.0.1:8000 · ProxyGuard ML</text>

  <!-- sidebar -->
  <rect x="10" y="52" width="220" height="658" fill="url(#side)"/>
  <text class="t" x="34" y="95" fill="#5EEAD4" font-size="13" font-weight="700">PROXYGUARD</text>
  <text class="t" x="34" y="116" fill="#94A3B8" font-size="11">Traffic Intelligence</text>
  <rect x="28" y="150" width="184" height="36" rx="10" fill="rgba(20,184,166,0.18)"/>
  <text class="t" x="48" y="173" fill="#ECFEFF" font-size="13">Dashboard</text>
  <text class="t" x="48" y="220" fill="#94A3B8" font-size="13">Datasets</text>
  <text class="t" x="48" y="258" fill="#94A3B8" font-size="13">Training</text>
  <text class="t" x="48" y="296" fill="#94A3B8" font-size="13">Predict</text>
  <text class="t" x="48" y="334" fill="#94A3B8" font-size="13">Experiments</text>
  <text class="t" x="48" y="372" fill="#94A3B8" font-size="13">Settings</text>

  <!-- main -->
  <text class="t" x="260" y="100" fill="#0F172A" font-size="28" font-weight="700">Operations Dashboard</text>
  <text class="t" x="260" y="128" fill="#64748B" font-size="14">Synthetic lab · seed 42 · 4-class encrypted proxy recognition</text>

  <!-- KPI cards -->
  <g filter="url(#cardShadow)">
    <rect x="260" y="160" width="200" height="110" rx="16" fill="#FFFFFF"/>
    <rect x="480" y="160" width="200" height="110" rx="16" fill="#FFFFFF"/>
    <rect x="700" y="160" width="200" height="110" rx="16" fill="#FFFFFF"/>
    <rect x="920" y="160" width="240" height="110" rx="16" fill="#FFFFFF"/>
  </g>
  <text class="t" x="280" y="195" fill="#64748B" font-size="12">ACTIVE SAMPLES</text>
  <text class="t" x="280" y="235" fill="#0F172A" font-size="32" font-weight="700">3,200</text>
  <text class="t" x="500" y="195" fill="#64748B" font-size="12">MODELS READY</text>
  <text class="t" x="500" y="235" fill="#0F172A" font-size="32" font-weight="700">8</text>
  <text class="t" x="720" y="195" fill="#64748B" font-size="12">BEST F1</text>
  <text class="t" x="720" y="235" fill="#0F766E" font-size="32" font-weight="700">0.752</text>
  <text class="t" x="940" y="195" fill="#64748B" font-size="12">WINNER</text>
  <text class="t" x="940" y="235" fill="#0F172A" font-size="24" font-weight="700">Soft Voting</text>

  <!-- chart panel -->
  <g filter="url(#cardShadow)">
    <rect x="260" y="300" width="560" height="360" rx="18" fill="#FFFFFF"/>
    <rect x="850" y="300" width="310" height="360" rx="18" fill="#FFFFFF"/>
  </g>
  <text class="t" x="285" y="340" fill="#0F172A" font-size="16" font-weight="700">Model Accuracy Comparison</text>
  <!-- fake bars -->
  <rect x="310" y="520" width="36" height="80" rx="6" fill="#99F6E4"/>
  <rect x="370" y="480" width="36" height="120" rx="6" fill="#5EEAD4"/>
  <rect x="430" y="450" width="36" height="150" rx="6" fill="#2DD4BF"/>
  <rect x="490" y="445" width="36" height="155" rx="6" fill="#14B8A6"/>
  <rect x="550" y="430" width="36" height="170" rx="6" fill="#0D9488"/>
  <rect x="610" y="420" width="36" height="180" rx="6" fill="#0F766E"/>
  <rect x="670" y="410" width="36" height="190" rx="6" fill="#115E59"/>
  <rect x="730" y="400" width="36" height="200" rx="6" fill="url(#chip)"/>
  <text class="t" x="305" y="630" fill="#94A3B8" font-size="10">DT</text>
  <text class="t" x="365" y="630" fill="#94A3B8" font-size="10">Ada</text>
  <text class="t" x="425" y="630" fill="#94A3B8" font-size="10">LGB</text>
  <text class="t" x="485" y="630" fill="#94A3B8" font-size="10">XGB</text>
  <text class="t" x="545" y="630" fill="#94A3B8" font-size="10">RF</text>
  <text class="t" x="600" y="630" fill="#94A3B8" font-size="10">Stack</text>
  <text class="t" x="665" y="630" fill="#94A3B8" font-size="10">SVM</text>
  <text class="t" x="720" y="630" fill="#94A3B8" font-size="10">Vote</text>

  <text class="t" x="875" y="340" fill="#0F172A" font-size="16" font-weight="700">Live Predict</text>
  <rect x="875" y="365" width="260" height="90" rx="12" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text class="t" x="895" y="400" fill="#64748B" font-size="12">predicted_label</text>
  <text class="t" x="895" y="430" fill="#0F766E" font-size="22" font-weight="700">trojan</text>
  <rect x="875" y="475" width="260" height="54" rx="12" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text class="t" x="895" y="508" fill="#0F172A" font-size="14">confidence  0.91</text>
  <rect x="875" y="555" width="260" height="48" rx="12" fill="url(#chip)"/>
  <text class="t" x="950" y="585" fill="#042F2E" font-size="15" font-weight="700">Run Inference</text>
</svg>
