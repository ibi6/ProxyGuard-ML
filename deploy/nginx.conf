worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format proxyguard '$remote_addr - $remote_user [$time_local] "$request" '
                          '$status $body_bytes_sent "$http_referer" '
                          '"$http_user_agent" $request_time';
    access_log /var/log/nginx/access.log proxyguard;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 20m;

    limit_req_zone $binary_remote_addr zone=proxyguard_read:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=proxyguard_write:10m rate=5r/s;

    upstream proxyguard_backend {
        server proxyguard:8000;
        keepalive 32;
    }

    server {
        listen 80 default_server;
        server_name _;

        location = /nginx-health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 'ok\n';
        }

        location ~ ^/api/(data/(generate|upload)|train|predict|settings|report/export) {
            limit_req zone=proxyguard_write burst=10 nodelay;
            proxy_pass http://proxyguard_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        location /api/ {
            limit_req zone=proxyguard_read burst=30 nodelay;
            proxy_pass http://proxyguard_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        location / {
            proxy_pass http://proxyguard_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }
    }
}
