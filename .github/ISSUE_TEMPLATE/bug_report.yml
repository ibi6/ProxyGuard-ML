name: 缺陷反馈
description: 报告 ProxyGuard ML 的问题
title: "[缺陷] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请尽量写清现象与复现步骤。
  - type: textarea
    id: summary
    attributes:
      label: 问题摘要
      description: 出了什么问题？
      placeholder: 简要描述现象。
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: 复现步骤
      description: 最小复现步骤
      placeholder: |
        1. 启动服务
        2. 打开 /train
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: 环境
      placeholder: Windows 11 / Python 3.12 / Chrome
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志 / 截图
      description: 粘贴相关报错或控制台输出
