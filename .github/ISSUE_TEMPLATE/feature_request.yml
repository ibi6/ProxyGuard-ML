name: 功能建议
description: 为 ProxyGuard ML 提出改进想法
title: "[功能] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 这个功能解决什么痛点？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 期望如何工作？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 其他可选方案
      description: 可选：考虑过的其他做法
