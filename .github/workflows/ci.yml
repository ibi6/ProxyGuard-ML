name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.8.4
      - name: Ruff check
        run: ruff check app tests scripts
      - name: Compileall
        run: python -m compileall -q app scripts tests

  test:
    name: Test · Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Pytest
        run: pytest -q --tb=short
      - name: Import + route smoke
        run: |
          python - <<'PY'
          from app.main import app
          assert app.title == "ProxyGuard ML"
          routes = {getattr(r, "path", None) for r in app.routes}
          for need in ("/api/health", "/api/system", "/api/train", "/api/predict"):
              assert need in routes, need
          print("ok", app.version, "routes", len(routes))
          PY

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t proxyguard-ml:ci .
